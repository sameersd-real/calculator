<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
        <link rel="stylesheet" href="first.css">
        <script src="script.js" defer></script>
</head>

<body>
    <div class="calculator-container">
        <a href="https://youtu.be/I_sdS4xQtV4?si=ZdQXKUZBhe08c88l">
        <button class="Butt">About</button>
        </a>
        <a href="https://youtu.be/HcOc7P5BMi4?si=X480kU2O5u88sGQC">
         <button class="But">HTML</button>
         </a>
         <a href="https://youtu.be/ESnrn1kAD4E?si=SAUsSSrq9p89rA5l">
         <button class="Bu">CSS</button>
         </a>
         <h1 class="title">Calculator</h1>
         
       <div class="calculator">
        
        
        
        <div class="display" id="display"></div>
        <div class="buttons">
            <button class="util" onClick = "clearDisplay()">AC</button>
            <button class="util" onClick = "del()">DEL</button>
            <button class="util" onClick = "appendDisplay('()')">()</button>
            <button class="op" onClick = "appendDisplay('/')">÷</button>
            <button class="num" onClick = "appendDisplay('7')">7</button>
            <button class="num" onClick = "appendDisplay('8')">8</button>
            <button class="num" onClick = "appendDisplay('9')">9</button>
            <button class="op" onClick = "appendDisplay('*')">x</button>
            <button class="num" onClick = "appendDisplay('4')">4</button>
            <button class="num" onClick = "appendDisplay('5')">5</button>
            <button class="num" onClick = "appendDisplay('6')">6</button>
            <button class="op" onClick = "appendDisplay('-')">-</button>
            <button class="num" onClick = "appendDisplay('1')">1</button>
            <button class="num" onClick = "appendDisplay('2')">2</button>
            <button class="num" onClick = "appendDisplay('3')">3</button>
            <button class="op" onClick = "appendDisplay('+')">+</button>
            <button class="num" onClick = "appendDisplay('%')">%</button>
            <button class="num" onClick = "appendDisplay('0')">0</button>
            <button class="num" onClick = "appendDisplay('.')">.</button>
            <button class="isequal" onClick = "evaluatae()">=</button>
        </div>
    </div>
    </div>
</div>
</body>
</html>
